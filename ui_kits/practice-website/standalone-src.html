  <script type="text/babel">
    function App() {
      const [route, setRoute] = React.useState('home');
      const go = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

      const screens = {
        home: window.HomeScreen,
        profile: window.ProfileScreen,
        fees: window.FeesScreen,
        booking: window.BookingScreen,
        press: window.PressScreen,
      };
      const Screen = screens[route] || window.HomeScreen;

      return (
        <React.Fragment>
          <window.SiteHeader route={route} go={go} />
          <main><Screen go={go} /></main>
          <window.SiteFooter go={go} />
        </React.Fragment>
      );
    }
    const start = () => {
      if (!window.HomeScreen || !window.SiteHeader) { setTimeout(start, 40); return; }
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    };
    start();
  </script>
