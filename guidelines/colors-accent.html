<!-- @dsCard group="Colors" viewport="700x180" name="Gold — Accent" subtitle="Sparing highlight from the favicon spark + EndoArt pioneer award" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 84px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-size: 11px; font-weight: var(--fw-semibold); font-family: var(--font-mono); color: var(--teal-900); }
  .meta { margin-top: 12px; font-size: var(--text-sm); color: var(--text-muted); display:flex; align-items:center; gap:10px; }
  .chip { font-family: var(--font-mono); font-size: 12px; color: var(--text-body); }
  .dot { display:inline-block; width:14px; height:14px; border-radius:50%; background:var(--color-accent); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--gold-200)"><span>200</span></div>
    <div class="sw" style="background:var(--gold-300)"><span>300</span></div>
    <div class="sw" style="background:var(--gold-400)"><span>400</span></div>
    <div class="sw" style="background:var(--gold-500)"><span>500</span></div>
    <div class="sw" style="background:var(--gold-600)"><span>600</span></div>
  </div>
  <div class="meta">
    <span class="dot"></span>
    <span class="chip">--color-accent&nbsp;=&nbsp;400&nbsp;#FFC107</span>
    <span style="color:var(--text-subtle)">· use for awards, distinctions, single highlights — never large fills</span>
  </div>
</body>
</html>
