<!-- @dsCard group="Colors" viewport="700x180" name="Neutral Slate" subtitle="Cool clinical greys for text, borders, surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-default); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-size: 11px; font-weight: var(--fw-semibold); font-family: var(--font-mono); }
  .lt { color: var(--neutral-800); }
  .dk { color: #fff; }
  .meta { margin-top: 12px; font-size: var(--text-sm); color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--neutral-0)"><span>0</span></div>
    <div class="sw lt" style="background:var(--neutral-50)"><span>50</span></div>
    <div class="sw lt" style="background:var(--neutral-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--neutral-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--neutral-300)"><span>300</span></div>
    <div class="sw lt" style="background:var(--neutral-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--neutral-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--neutral-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--neutral-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--neutral-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--neutral-900)"><span>900</span></div>
  </div>
  <div class="meta">--text-body 800 · --text-muted 600 · --border-default 200 · --surface-mist 50</div>
</body>
</html>
