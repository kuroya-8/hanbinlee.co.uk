<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Han Bin Lee — Consultant Ophthalmologist</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  #app > main { flex: 1; }
  a { text-decoration: none; }
  [data-lucide] { width: 20px; height: 20px; stroke-width: 2; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="HomeScreen.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>
  <script type="text/babel" src="FeesScreen.jsx"></script>
  <script type="text/babel" src="BookingScreen.jsx"></script>
  <script type="text/babel" src="PressScreen.jsx"></script>
  <script type="text/babel">
    function App() {
      const [route, setRoute] = React.useState('home');
      const go = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });

      const screens = {
        home: window.HomeScreen,
        profile: window.ProfileScreen,
        fees: window.FeesScreen,
        booking: window.BookingScreen,
        press: window.PressScreen,
      };
      const Screen = screens[route] || window.HomeScreen;

      return (
        <React.Fragment>
          <window.SiteHeader route={route} go={go} />
          <main><Screen go={go} /></main>
          <window.SiteFooter go={go} />
        </React.Fragment>
      );
    }
    const start = () => {
      if (!window.HomeScreen || !window.SiteHeader) { setTimeout(start, 40); return; }
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    };
    start();
  </script>
</body>
</html>
