<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); display:grid; grid-template-columns: 1.4fr 1fr; }
  .panel { display:flex; align-items:center; justify-content:center; padding: 26px; min-height: 178px; }
  .light { background: var(--surface-page); }
  .tint { background: var(--surface-tint); border-left: 1px solid var(--border-tint); }
  .full { height: 130px; width: auto; }
  .mark { height: 116px; width: auto; }
</style>
</head>
<body>
  <div class="panel light"><img class="full" src="../assets/brand/logo-full.png" alt="Han Bin Lee — Consultant Ophthalmologist"></div>
  <div class="panel tint"><img class="mark" src="../assets/brand/logo-mark.png" alt="Eye mark"></div>
</body>
</html>
