<!-- @dsCard group="Colors" viewport="700x180" name="Petrol Teal — Primary" subtitle="Signature brand ramp, #007A87 at 500" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; }
  .sw span { font-size: 11px; font-weight: var(--fw-semibold); font-family: var(--font-mono); }
  .lt { color: var(--teal-900); }
  .dk { color: #fff; }
  .meta { margin-top: 12px; display: flex; gap: 8px; font-size: var(--text-sm); color: var(--text-muted); }
  .chip { font-family: var(--font-mono); font-size: 12px; color: var(--text-body); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw lt" style="background:var(--teal-50)"><span>50</span></div>
    <div class="sw lt" style="background:var(--teal-100)"><span>100</span></div>
    <div class="sw lt" style="background:var(--teal-200)"><span>200</span></div>
    <div class="sw lt" style="background:var(--teal-300)"><span>300</span></div>
    <div class="sw dk" style="background:var(--teal-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--teal-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--teal-600)"><span>600</span></div>
    <div class="sw dk" style="background:var(--teal-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--teal-800)"><span>800</span></div>
    <div class="sw dk" style="background:var(--teal-900)"><span>900</span></div>
  </div>
  <div class="meta">
    <span class="chip">--color-primary&nbsp;=&nbsp;500&nbsp;#007A87</span>
    <span class="chip">--color-primary-strong&nbsp;=&nbsp;700&nbsp;#004A55</span>
  </div>
</body>
</html>
