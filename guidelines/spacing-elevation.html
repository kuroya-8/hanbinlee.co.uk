<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Soft teal-tinted shadow ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 26px; background: var(--surface-mist); }
  .row { display:flex; gap:24px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width: 96px; height: 72px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lab">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><span class="lab">card</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lab">xl</span></div>
  </div>
</body>
</html>
