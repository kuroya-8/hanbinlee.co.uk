<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {%- assign sep = "" -%}
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.practice.honorific }} {{ site.practice.full_name }} — {{ site.tagline }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/eye-favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
  {% include header.html %}
  <main id="main">
    {{ content }}
  </main>
  {% include footer.html %}

  <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
