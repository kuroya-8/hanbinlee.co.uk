<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 30px; background: var(--surface-mist); }
  .block { max-width: 560px; }
  .eyebrow { margin-bottom: 12px; }
  h2 { font-size: var(--text-3xl); margin: 0 0 12px; color: var(--text-heading); }
  .lead { font-size: var(--text-md); line-height: var(--leading-normal); color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <div class="block">
    <div class="eyebrow">Corneal Service</div>
    <h2>A pioneer in artificial cornea transplantation</h2>
    <p class="lead">Combining digital predictive modelling with front-line surgical precision to restore sight and raise the standard of patient recovery.</p>
  </div>
</body>
</html>
