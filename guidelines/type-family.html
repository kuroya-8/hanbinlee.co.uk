<!-- @dsCard group="Type" viewport="700x210" name="Family & Weights" subtitle="Source Sans Pro — regular, semibold, bold, italic" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-page); }
  .big { font-size: 46px; line-height: 1; letter-spacing: var(--tracking-tight); color: var(--text-heading); margin-bottom: 18px; }
  .row { display: flex; gap: 28px; flex-wrap: wrap; }
  .w { display:flex; flex-direction:column; gap:2px; }
  .w .s { font-size: var(--text-lg); color: var(--text-body); }
  .w .l { font-size: 11px; font-family: var(--font-mono); color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="big">Aa Bb Cc &nbsp; 20/40 vision</div>
  <div class="row">
    <div class="w"><span class="s" style="font-weight:400">Regular</span><span class="l">400 · body</span></div>
    <div class="w"><span class="s" style="font-weight:500">Medium</span><span class="l">500 · labels</span></div>
    <div class="w"><span class="s" style="font-weight:600">Semibold</span><span class="l">600 · UI / headings</span></div>
    <div class="w"><span class="s" style="font-weight:700">Bold</span><span class="l">700 · display</span></div>
    <div class="w"><span class="s" style="font-weight:400; font-style:italic">Italic</span><span class="l">400i · quotes</span></div>
  </div>
</body>
</html>
