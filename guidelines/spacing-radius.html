<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radius" subtitle="From subtle controls to pill toggles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-page); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width: 84px; height: 64px; background: var(--teal-50); border: 1.5px solid var(--teal-300); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 6</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lab">xl · 16</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lab">2xl · 24</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill); width:120px"></div><span class="lab">pill</span></div>
  </div>
</body>
</html>
