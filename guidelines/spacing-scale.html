<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base grid, --space-1 through --space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-page); }
  .scale { display:flex; flex-direction:column; gap:9px; }
  .r { display:flex; align-items:center; gap:14px; }
  .bar { height: 16px; background: var(--teal-300); border-radius: 3px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 130px; }
</style>
</head>
<body>
  <div class="scale">
    <div class="r"><span class="lab">--space-1 · 4</span><div class="bar" style="width:4px"></div></div>
    <div class="r"><span class="lab">--space-2 · 8</span><div class="bar" style="width:8px"></div></div>
    <div class="r"><span class="lab">--space-3 · 12</span><div class="bar" style="width:12px"></div></div>
    <div class="r"><span class="lab">--space-4 · 16</span><div class="bar" style="width:16px"></div></div>
    <div class="r"><span class="lab">--space-6 · 24</span><div class="bar" style="width:24px"></div></div>
    <div class="r"><span class="lab">--space-7 · 32</span><div class="bar" style="width:32px"></div></div>
    <div class="r"><span class="lab">--space-9 · 48</span><div class="bar" style="width:48px"></div></div>
    <div class="r"><span class="lab">--space-10 · 64</span><div class="bar" style="width:64px"></div></div>
    <div class="r"><span class="lab">--space-11 · 80</span><div class="bar" style="width:80px"></div></div>
  </div>
</body>
</html>
