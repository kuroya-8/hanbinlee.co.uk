<html lang="en">

<link rel="stylesheet" href="../styles.css">

</style>
</head>
<body>
  <figure><img src="../assets/images/portrait.jpg" alt="Portrait"><figcaption>Portrait · EndoArt pioneer</figcaption></figure>
