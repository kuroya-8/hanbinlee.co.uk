<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}">
    <img src="{{ '/assets/images/eye-favicon.svg' | relative_url }}" alt="">
    <span>
      <span class="name" style="display:block">{{ site.practice.honorific }} {{ site.practice.full_name }}</span>
      <span class="role">{{ site.tagline }}</span>
    </span>
  </a>

  <button class="nav-toggle icon-btn" aria-label="Toggle navigation" aria-expanded="false" data-nav-toggle>
    <i data-lucide="menu"></i>
  </button>

  <nav class="site-nav" data-nav>
    {%- for item in site.nav -%}
      <a href="{{ item.url | relative_url }}"{% if page.nav_id == item.id %} class="is-active" aria-current="page"{% endif %}>{{ item.title }}</a>
    {%- endfor -%}
    <a class="btn btn--primary btn--sm" href="{{ '/booking/' | relative_url }}">
      <i data-lucide="calendar-check"></i> Book
    </a>
  </nav>
</header>

<!-- Header Accessibility Controls -->
<div class="header-accessibility" style="display: inline-flex; gap: 8px; align-items: center; margin-left: 15px;">
  
  <button onclick="adjustTextSize(-1)" style="cursor: pointer; background: none; border: none; padding: 4px; display: flex; align-items: center;" title="Smaller Text">
    <i data-lucide="a-arrow-down" style="width: 18px; height: 18px; color: currentColor;"></i>
  </button>
  
  <button onclick="resetTextSize()" style="cursor: pointer; background: none; border: none; padding: 4px; display: flex; align-items: center;" title="Reset Text">
    <i data-lucide="rotate-ccw" style="width: 16px; height: 16px; color: currentColor;"></i> 
  </button>
  
  <button onclick="adjustTextSize(1)" style="cursor: pointer; background: none; border: none; padding: 4px; display: flex; align-items: center;" title="Larger Text">
    <i data-lucide="a-arrow-up" style="width: 18px; height: 18px; color: currentColor;"></i>
  </button>

  <span style="border-left: 1px solid currentColor; opacity: 0.3; height: 16px; margin: 0 4px;"></span>

  <button onclick="toggleDarkMode()" style="cursor: pointer; background: none; border: none; padding: 4px; display: flex; align-items: center;" title="Toggle Dark Mode">
    <i data-lucide="moon-star" style="width: 18px; height: 18px; color: currentColor;"></i>
  </button>
</div>

<!-- Optimized Global Dark Mode CSS -->
<style>
  /* 1. The Deep Background */
  body.dark-theme {
    background-color: #121212 !important;
    color: #e5e7eb !important;
  }

  /* 2. Strip stubborn white backgrounds from layout containers */
  body.dark-theme main,
  body.dark-theme section,
  body.dark-theme .section,
  body.dark-theme .container,
  body.dark-theme .wrapper,
  body.dark-theme .page-content {
    background-color: transparent !important;
  }

  /* 3. Elevated Cards & Specific UI Elements from Screenshots */
  /* This targets the cards, the portrait frame, tags, secondary buttons, and alert boxes */
  body.dark-theme .card, 
  body.dark-theme .hero-inner,
  body.dark-theme .doctify-widget,
  body.dark-theme .badge-float,
  body.dark-theme .frame,
  body.dark-theme .tag,
  body.dark-theme .btn--secondary,
  body.dark-theme .btn--outline,
  body.dark-theme [class*="notice"],
  body.dark-theme [class*="alert"] {
    background-color: #1e1e1e !important;
    border: 1px solid #333333 !important;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5) !important;
    color: #f3f4f6 !important;
  }

  /* 4. Force Global Typography to be visible */
  body.dark-theme h1, body.dark-theme h2, 
  body.dark-theme h3, body.dark-theme h4, 
  body.dark-theme p, body.dark-theme li, 
  body.dark-theme .lead, body.dark-theme span:not(.btn) {
    color: #f3f4f6 !important;
  }

  /* 5. Keep Links Blue */
  body.dark-theme a:not(.btn) {
    color: #60a5fa !important; 
  }
</style>

<!-- Persistent Control Logic -->
<script>
  // --- Initialization (Runs immediately to prevent flashing) ---
  let textSizeMultiplier = localStorage.getItem('textSize') ? parseInt(localStorage.getItem('textSize')) : 100;
  
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-theme');
  }
  if (textSizeMultiplier !== 100) {
    document.documentElement.style.fontSize = textSizeMultiplier + "%";
  }

  // --- Text Resizer Logic ---
  function adjustTextSize(direction) {
    textSizeMultiplier += (direction * 10);
    if (textSizeMultiplier > 160) textSizeMultiplier = 160; 
    if (textSizeMultiplier < 80) textSizeMultiplier = 80;   
    document.documentElement.style.fontSize = textSizeMultiplier + "%";
    localStorage.setItem('textSize', textSizeMultiplier); // Saves setting
  }

  function resetTextSize() {
    textSizeMultiplier = 100;
    document.documentElement.style.fontSize = "100%";
    localStorage.setItem('textSize', 100); // Resets saved setting
  }

  // --- Dark Mode Logic ---
  function toggleDarkMode() {
    document.body.classList.toggle('dark-theme');
    
    // Checks if the theme is now dark, and saves the preference
    if (document.body.classList.contains('dark-theme')) {
      localStorage.setItem('theme', 'dark');
    } else {
      localStorage.setItem('theme', 'light');
    }
  }
</script>
